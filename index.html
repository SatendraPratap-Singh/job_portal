<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Job Planning</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background:#f2f3f5;
    margin:0;
    padding:15px;
}

.container {
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:12px;
}

input, select, textarea {
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
}

button {
    padding:12px;
    margin-top:10px;
    width:100%;
}
</style>
</head>

<body>

<div class="container">
<h2>Daily Job Planning</h2>

<label>Email Address</label>
<input type="email" id="email" placeholder="Enter your email">

<label>Date</label>
<input type="date" id="date">

<label>Line</label>
<select id="line">
<option>Clinkerization</option>
<option>Cement Unit</option>
<option>Power Plant</option>
</select>

<label>Department</label>
<select id="department">
<option>Mechanical</option>
<option>Process</option>
<option>Electrical</option>
<option>Instrument</option>
<option>Civil</option>
<option>Automobile</option>
<option>Mines</option>
<option>HR & Admin</option>
<option>IT</option>
<option>O&M</option>
</select>

<label>Location (Specific Site/Zone)</label>
<input type="text" id="location">

<label>Activity - Brief Description</label>
<textarea id="activity"></textarea>

<label>Job Category</label>
<select id="category">
<option>Routine</option>
<option>Non-Routine</option>
</select>

<label>Priority Level</label>
<select id="priority">
<option>High</option>
<option>Medium</option>
<option>Low</option>
</select>

<label>Job Done By (Team/Person)</label>
<input type="text" id="person">

<label>Critical Activity Involved</label>
<select id="critical">
<option>Working at height</option>
<option>Confined space entry</option>
<option>Electrical Safety</option>
<option>LOTOTO</option>
<option>Hot Work</option>
<option>Material lifting</option>
</select>

<label>1st Person Responsible (Supervisor)</label>
<input type="text" id="supervisor">

<label>Contact Number</label>
<input type="number" id="contact">

<label>Permit Status</label>
<select id="permit">
<option>Taken</option>
<option>Not Taken</option>
<option>Not Required</option>
</select>

<label>HIRA / SOP Availability</label>
<select id="hira">
<option>Available</option>
<option>Not Available</option>
</select>

<label>Activity Status</label>
<select id="status">
<option>Planned</option>
<option>Under Progress</option>
<option>Completed</option>
</select>

<button onclick="saveData()">Submit Data</button>
<button onclick="downloadExcel()">Download Report</button>

</div>

<script>

const API = "https://jobportal-production-b3c0.up.railway.app/api/jobplans";

function saveData(){

let data = {
email: document.getElementById("email").value,
date: document.getElementById("date").value,
line: document.getElementById("line").value,
department: document.getElementById("department").value,
location: document.getElementById("location").value,
activity: document.getElementById("activity").value,
category: document.getElementById("category").value,
priority: document.getElementById("priority").value,
person: document.getElementById("person").value,
critical: document.getElementById("critical").value,
supervisor: document.getElementById("supervisor").value,
contact: document.getElementById("contact").value,
permit: document.getElementById("permit").value,
hira: document.getElementById("hira").value,
status: document.getElementById("status").value
};

fetch(API,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify(data)
})
.then(()=>alert("Data Saved ✅"))
.catch(()=>alert("Error ❌"));
}

function downloadExcel(){

let email = document.getElementById("email").value;

if(!email){
alert("Please enter email first ❌");
return;
}

fetch(`${API}/${encodeURIComponent(email)}`)
.then(res=>res.json())
.then(data=>{

if(data.length===0){
alert("No data found ❌");
return;
}

let csv="";
let headers = Object.keys(data[0]);
csv+=headers.join(",")+"\n";

data.forEach(r=>{
let row=headers.map(h=>`"${r[h]||""}"`);
csv+=row.join(",")+"\n";
});

let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="Job_Report.csv";
a.click();

});
}

</script>

</body>
</html>
